<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Detalle de Inscripciones</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">

</head>

<body>

<script>
if(!localStorage.getItem("token")){
    window.location.href="/";
}
</script>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href = "/";
}
</script>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">Eventos Academicos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/dashboard">🏠 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/evento_html">📅 Eventos</a></li>
                <li class="nav-item"><a class="nav-link" href="/participante_html">👤 Participantes</a></li>
                <li class="nav-item"><a class="nav-link" href="/inscripcion_html">📝 Inscripciones</a></li>
                <li class="nav-item"><a class="nav-link" href="/asistencia_html">✅ Asistencias</a></li>
                <li class="nav-item"><a class="nav-link" href="/detalle_inscripciones_html">📋 Detalle Inscripciones</a></li>
            </ul>
            <button class="btn btn-outline-light" onclick="logout()">🚪 Cerrar Sesión</button>
        </div>
    </div>
</nav>

<div class="content">

<div class="topbar">
    <h3>Detalle de Inscripciones</h3>
</div>

<div class="tabla-contenedor">

<table class="table table-striped table-hover align-middle">

<thead class="table-dark">

<tr>
    <th scope="col">#</th>
    <th>Participante</th>
    <th>Evento</th>
    <th>Fecha Inscripción</th>
    <th>Estado</th>
</tr>

</thead>

<tbody id="tablaDetalle">

</tbody>

</table>

</div>

</div>

<script>

async function cargarDetalle(){

    const response = await fetch('/detalle_inscripciones');

    const data = await response.json();

    let filas = "";

    data.forEach((item, idx) => {

        filas += `
        <tr>

            <td>${idx + 1}</td>
            <td>${item.participante}</td>
            <td>${item.evento}</td>
            <td>${item.fecha_inscripcion}</td>
            <td>${item.estado}</td>

        </tr>
        `;

    });

    document.getElementById("tablaDetalle").innerHTML = filas;
}

cargarDetalle();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
