<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asistencias</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">

</head>

<body>

<script>
if(!localStorage.getItem("token")){
    window.location.href="/";
}
</script>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href = "/";
}
</script>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">Eventos Academicos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/dashboard">🏠 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/evento_html">📅 Eventos</a></li>
                <li class="nav-item"><a class="nav-link" href="/participante_html">👤 Participantes</a></li>
                <li class="nav-item"><a class="nav-link" href="/inscripcion_html">📝 Inscripciones</a></li>
                <li class="nav-item"><a class="nav-link" href="/asistencia_html">✅ Asistencias</a></li>
                <li class="nav-item"><a class="nav-link" href="/detalle_inscripciones_html">📋 Detalle Inscripciones</a></li>
            </ul>
            <button class="btn btn-outline-light" onclick="logout()">🚪 Cerrar Sesión</button>
        </div>
    </div>
</nav>

<div class="content">

<div class="topbar">
    <h3>Gestión de Asistencias</h3>
</div>

<div class="tabla-contenedor">

<div class="d-flex justify-content-between mb-3">

<h4>Listado de Asistencias</h4>

<button class="btn btn-success"
onclick="mostrarFormulario()">
➕ Registrar Asistencia
</button>

</div>

<div class="card mb-4"
id="formularioAsistencia"
style="display:none;">

<div class="card-header">
Nueva Asistencia
</div>

<div class="card-body">

<input type="number"
id="id_participante"
class="form-control mb-2"
placeholder="ID Participante">

<input type="number"
id="id_evento"
class="form-control mb-2"
placeholder="ID Evento">

<input type="date"
id="fecha_registro"
class="form-control mb-2">

<select
id="asistio"
class="form-control mb-2">

<option value="1">Asistió</option>
<option value="0">No Asistió</option>

</select>

<button class="btn btn-success"
onclick="guardarAsistencia()">
Guardar
</button>

<button class="btn btn-secondary"
onclick="ocultarFormulario()">
Cancelar
</button>

</div>

</div>

<table class="table table-striped table-hover align-middle">

<thead class="table-dark">

<tr>
<th scope="col">#</th>
<th>ID</th>
<th>ID Participante</th>
<th>ID Evento</th>
<th>Fecha Registro</th>
<th>Asistió</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaAsistencias"></tbody>

</table>

</div>

</div>

<script>

const token = localStorage.getItem("token");

function mostrarFormulario(){
    document.getElementById("formularioAsistencia").style.display="block";
}

function ocultarFormulario(){
    document.getElementById("formularioAsistencia").style.display="none";
}

async function listarAsistencias(){

    const response = await fetch("/asistencia");

    const data = await response.json();

    let filas = "";

    if(Array.isArray(data)){

        data.forEach((asistencia, idx)=>{

            filas += `
            <tr>

            <td>${idx + 1}</td>
            <td>${asistencia.id_asistencia}</td>
            <td>${asistencia.id_participante}</td>
            <td>${asistencia.id_evento}</td>
            <td>${asistencia.fecha_registro}</td>
            <td>${asistencia.asistio}</td>

            <td>

            <button
            class="btn btn-warning btn-sm"
            onclick="editarAsistencia(${asistencia.id_asistencia})">
            Editar
            </button>

            <button
            class="btn btn-danger btn-sm"
            onclick="eliminarAsistencia(${asistencia.id_asistencia})">
            Eliminar
            </button>

            </td>

            </tr>
            `;
        });
    }

    document.getElementById("tablaAsistencias").innerHTML = filas;
}

async function guardarAsistencia(){

    const response = await fetch("/asistencia",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },

        body:JSON.stringify({

            id_participante:document.getElementById("id_participante").value,
            id_evento:document.getElementById("id_evento").value,
            fecha_registro:document.getElementById("fecha_registro").value,
            asistio:document.getElementById("asistio").value

        })

    });

    const data = await response.json();

    alert(data.mensaje);

    ocultarFormulario();

    listarAsistencias();
}

async function editarAsistencia(id){

    const id_participante = prompt("ID Participante:");
    if(id_participante == null) return;

    const id_evento = prompt("ID Evento:");
    if(id_evento == null) return;

    const fecha_registro = prompt("Fecha Registro (YYYY-MM-DD):");
    if(fecha_registro == null) return;

    const asistio = prompt("Asistió (1=Sí, 0=No):");
    if(asistio == null) return;

    const response = await fetch(`/asistencia/${id}`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },

        body:JSON.stringify({
            id_participante:id_participante,
            id_evento:id_evento,
            fecha_registro:fecha_registro,
            asistio:asistio
        })

    });

    const data = await response.json();

    alert(data.mensaje);

    listarAsistencias();
}

async function eliminarAsistencia(id){

    if(!confirm("¿Eliminar asistencia?")){
        return;
    }

    const response = await fetch(`/asistencia/${id}`,{

        method:"DELETE",

        headers:{
            "Authorization":"Bearer "+token
        }

    });

    const data = await response.json();

    alert(data.mensaje);

    listarAsistencias();
}

listarAsistencias();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
