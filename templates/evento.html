<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eventos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">

</head>

<body>

<script>
if(!localStorage.getItem("token")){
    window.location.href="/";
}
</script>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">Eventos Academicos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/dashboard">🏠 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/evento_html">📅 Eventos</a></li>
                <li class="nav-item"><a class="nav-link" href="/participante_html">👤 Participantes</a></li>
                <li class="nav-item"><a class="nav-link" href="/inscripcion_html">📝 Inscripciones</a></li>
                <li class="nav-item"><a class="nav-link" href="/asistencia_html">✅ Asistencias</a></li>
                <li class="nav-item"><a class="nav-link" href="/detalle_inscripciones_html">📋 Detalle Inscripciones</a></li>
            </ul>
            <button class="btn btn-outline-light" onclick="logout()">🚪 Cerrar Sesión</button>
        </div>
    </div>
</nav>

<div class="content">

<div class="topbar">

<h3>Gestión de Eventos</h3>

</div>

<div class="tabla-contenedor">

<div class="d-flex justify-content-between mb-3">

<h4>Listado de Eventos</h4>

<button class="btn btn-success"
onclick="mostrarFormulario()">
➕ Registrar Evento
</button>

</div>

<div class="card mb-4"
id="formularioEvento"
style="display:none;">

<div class="card-header">
Nuevo Evento
</div>

<div class="card-body">

<input type="text"
id="nombre"
class="form-control mb-2"
placeholder="Nombre">

<input type="text"
id="descripcion"
class="form-control mb-2"
placeholder="Descripción">

<input type="date"
id="fecha"
class="form-control mb-2">

<input type="time"
id="hora"
class="form-control mb-2">

<input type="text"
id="lugar"
class="form-control mb-2"
placeholder="Lugar">

<input type="text"
id="tipo_evento"
class="form-control mb-2"
placeholder="Tipo Evento">

<input type="number"
id="capacidad"
class="form-control mb-2"
placeholder="Capacidad">

<button class="btn btn-success"
onclick="guardarEvento()">
Guardar
</button>

<button class="btn btn-secondary"
onclick="ocultarFormulario()">
Cancelar
</button>

</div>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Fecha</th>
<th>Hora</th>
<th>Lugar</th>
<th>Tipo</th>
<th>Capacidad</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaEventos"></tbody>

</table>

</div>

</div>

<script>

const token = localStorage.getItem("token");

function mostrarFormulario(){
    document.getElementById("formularioEvento").style.display="block";
}

function ocultarFormulario(){
    document.getElementById("formularioEvento").style.display="none";
}

async function listarEventos(){

    const response = await fetch("/evento");

    const data = await response.json();

    let filas = "";

    if(Array.isArray(data)){

        data.forEach(evento=>{

            filas += `
            <tr>

            <td>${evento.id_evento}</td>
            <td>${evento.nombre}</td>
            <td>${evento.fecha}</td>
            <td>${evento.hora}</td>
            <td>${evento.lugar}</td>
            <td>${evento.tipo_evento}</td>
            <td>${evento.capacidad}</td>

            <td>

            <button
            class="btn btn-warning btn-sm"
            onclick="editarEvento(${evento.id_evento})">
            Editar
            </button>

            <button
            class="btn btn-danger btn-sm"
            onclick="eliminarEvento(${evento.id_evento})">
            Eliminar
            </button>

            </td>

            </tr>
            `;

        });

    }

    document.getElementById("tablaEventos").innerHTML = filas;

}

async function guardarEvento(){

    const response = await fetch("/evento",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },

        body:JSON.stringify({

            nombre:document.getElementById("nombre").value,
            descripcion:document.getElementById("descripcion").value,
            fecha:document.getElementById("fecha").value,
            hora:document.getElementById("hora").value,
            lugar:document.getElementById("lugar").value,
            tipo_evento:document.getElementById("tipo_evento").value,
            capacidad:document.getElementById("capacidad").value

        })

    });

    const data = await response.json();

    alert(data.mensaje);

    ocultarFormulario();

    listarEventos();

}

async function editarEvento(id){

    const nombre = prompt("Nuevo nombre:");
    if(nombre == null) return;

    const descripcion = prompt("Nueva descripción:");
    if(descripcion == null) return;

    const fecha = prompt("Fecha (YYYY-MM-DD):");
    if(fecha == null) return;

    const hora = prompt("Hora (HH:MM:SS):");
    if(hora == null) return;

    const lugar = prompt("Lugar:");
    if(lugar == null) return;

    const tipo_evento = prompt("Tipo Evento:");
    if(tipo_evento == null) return;

    const capacidad = prompt("Capacidad:");
    if(capacidad == null) return;

    const response = await fetch(`/evento/${id}`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },

        body:JSON.stringify({
            nombre:nombre,
            descripcion:descripcion,
            fecha:fecha,
            hora:hora,
            lugar:lugar,
            tipo_evento:tipo_evento,
            capacidad:capacidad
        })

    });

    const data = await response.json();

    alert(data.mensaje);

    listarEventos();
}

async function eliminarEvento(id){

    if(!confirm("¿Eliminar evento?")){
        return;
    }

    const response = await fetch(`/evento/${id}`,{

        method:"DELETE",

        headers:{
            "Authorization":"Bearer "+token
        }

    });

    const data = await response.json();

    alert(data.mensaje);

    listarEventos();

}

listarEventos();

</script>

</body>
</html>
