<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Participantes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body>

<script>
if(!localStorage.getItem("token")){
    window.location.href="/";
}
</script>

<div class="sidebar">

    <h2>Eventos</h2>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/evento_html">📅 Eventos</a>
    <a href="/participante_html">👤 Participantes</a>
    <a href="/inscripcion_html">📝 Inscripciones</a>
    <a href="/asistencia_html">✅ Asistencias</a>
    <a href="/detalle_inscripciones_html">📋 Detalle Inscripciones</a>

</div>

<div class="content">

<div class="topbar">
    <h3>Gestión de Participantes</h3>
</div>

<div class="tabla-contenedor">

<div class="d-flex justify-content-between mb-3">

<h4>Listado de Participantes</h4>

<button class="btn btn-success"
onclick="mostrarFormulario()">
➕ Registrar Participante
</button>

</div>

<div class="card mb-4"
id="formularioParticipante"
style="display:none;">

<div class="card-header">
Nuevo Participante
</div>

<div class="card-body">

<input type="text"
id="nombres"
class="form-control mb-2"
placeholder="Nombres">

<input type="text"
id="apellidos"
class="form-control mb-2"
placeholder="Apellidos">

<input type="email"
id="correo"
class="form-control mb-2"
placeholder="Correo">

<input type="text"
id="telefono"
class="form-control mb-2"
placeholder="Teléfono">

<input type="text"
id="institucion"
class="form-control mb-2"
placeholder="Institución">

<button class="btn btn-success"
onclick="guardarParticipante()">
Guardar
</button>

<button class="btn btn-secondary"
onclick="ocultarFormulario()">
Cancelar
</button>

</div>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nombres</th>
<th>Apellidos</th>
<th>Correo</th>
<th>Teléfono</th>
<th>Institución</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaParticipantes"></tbody>

</table>

</div>

</div>

<script>

const token = localStorage.getItem("token");

function mostrarFormulario(){
    document.getElementById("formularioParticipante").style.display="block";
}

function ocultarFormulario(){
    document.getElementById("formularioParticipante").style.display="none";
}

async function listarParticipantes(){

    const response = await fetch("/participante");
    const data = await response.json();

    let filas = "";

    if(Array.isArray(data)){

        data.forEach(participante=>{

            filas += `
            <tr>

            <td>${participante.id_participante}</td>
            <td>${participante.nombres}</td>
            <td>${participante.apellidos}</td>
            <td>${participante.correo}</td>
            <td>${participante.telefono}</td>
            <td>${participante.institucion}</td>

            <td>

            <button
            class="btn btn-warning btn-sm"
            onclick="editarParticipante(${participante.id_participante})">
            Editar
            </button>

            <button
            class="btn btn-danger btn-sm"
            onclick="eliminarParticipante(${participante.id_participante})">
            Eliminar
            </button>

            </td>

            </tr>
            `;
        });
    }

    document.getElementById("tablaParticipantes").innerHTML = filas;
}

async function guardarParticipante(){

    const response = await fetch("/participante",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },

        body:JSON.stringify({

            nombres:document.getElementById("nombres").value,
            apellidos:document.getElementById("apellidos").value,
            correo:document.getElementById("correo").value,
            telefono:document.getElementById("telefono").value,
            institucion:document.getElementById("institucion").value

        })

    });

    const data = await response.json();

    alert(data.mensaje);

    ocultarFormulario();

    listarParticipantes();
}

async function editarParticipante(id){

    const nombres = prompt("Nombres:");
    if(nombres == null) return;

    const apellidos = prompt("Apellidos:");
    if(apellidos == null) return;

    const correo = prompt("Correo:");
    if(correo == null) return;

    const telefono = prompt("Teléfono:");
    if(telefono == null) return;

    const institucion = prompt("Institución:");
    if(institucion == null) return;

    const response = await fetch(`/participante/${id}`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },

        body:JSON.stringify({
            nombres:nombres,
            apellidos:apellidos,
            correo:correo,
            telefono:telefono,
            institucion:institucion
        })

    });

    const data = await response.json();

    alert(data.mensaje);

    listarParticipantes();
}

async function eliminarParticipante(id){

    if(!confirm("¿Eliminar participante?")){
        return;
    }

    const response = await fetch(`/participante/${id}`,{

        method:"DELETE",

        headers:{
            "Authorization":"Bearer "+token
        }

    });

    const data = await response.json();

    alert(data.mensaje);

    listarParticipantes();
}

listarParticipantes();

</script>

</body>
</html>
